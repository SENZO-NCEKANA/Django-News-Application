services:
  web:
    build: .
    command: sh -c "mkdir -p /app/db && chmod 777 /app/db && touch /app/db/db.sqlite3 && chmod 666 /app/db/db.sqlite3 && python manage.py migrate && python manage.py create_sample_data && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - db_data:/app/db
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - SECRET_KEY=django-insecure-test-key-for-docker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  db_data:
